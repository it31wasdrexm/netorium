name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: |
          python -m pytest
          python -m ruff check .
          python -m mypy netorium

  standalone:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: netorium-linux-x64
            source: dist/netorium
          - os: windows-latest
            artifact: netorium-windows-x64.exe
            source: dist/netorium.exe
          - os: macos-13
            artifact: netorium-macos-x64
            source: dist/netorium
          - os: macos-latest
            artifact: netorium-macos-arm64
            source: dist/netorium
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install release dependencies
        run: python -m pip install -e ".[release]"
      - name: Build standalone executable
        run: pyinstaller --noconfirm --clean packaging/netorium.spec
      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p release-assets
          cp "${{ matrix.source }}" "release-assets/${{ matrix.artifact }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release-assets/${{ matrix.artifact }}

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}

  github-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - standalone
      - docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
